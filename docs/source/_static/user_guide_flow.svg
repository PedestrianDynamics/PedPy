<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="934" height="340" viewBox="248 70 934 340" role="img" aria-label="PedPy user guide workflow">
  <defs>
    <style><![CDATA[
      .card {
        fill: none;
        stroke: #d1d5db;
        stroke-width: 1.5;
      }
      .card-click:hover .card {
        fill: #ffffff;
        stroke: #4AA3C4;
        stroke-width: 2;
      }
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #4AA3C4;
        text-anchor: middle;
      }
      .arrow {
        stroke: #4AA3C4;
        stroke-width: 2.2;
        fill: none;
        marker-end: url(#arrowhead);
      }
      .arrow-dashed {
        stroke: #4AA3C4;
        stroke-width: 2.2;
        stroke-dasharray: 8 5;
        fill: none;
        marker-end: url(#arrowhead);
      }
      .connector {
        stroke: #4AA3C4;
        stroke-width: 2.2;
        fill: none;
      }
      .group-box {
        fill: none;
        stroke: #9ca3af;
        stroke-width: 1.2;
        stroke-dasharray: 6 4;
      }
      .group-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-style: italic;
        fill: #9ca3af;
        text-anchor: middle;
      }
    ]]></style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4AA3C4" />
    </marker>
  </defs>

